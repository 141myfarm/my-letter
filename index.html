<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victorian Letter</title>
    <style>
        /* Общие стили */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f4e4d7; /* Цвет бумаги из видео */
            font-family: 'Georgia', serif;
            overflow: hidden; /* Чтобы не было полос прокрутки */
        }

        /* Контейнер для письма */
        .envelope-wrapper {
            position: relative;
            width: 300px; /* Размер сложенного письма */
            height: 300px;
            cursor: pointer;
            transition: transform 0.5s ease-out;
            perspective: 1000px; /* Для 3D эффекта */
        }

        /* Анимация увеличения при наведении */
        .envelope-wrapper:hover {
            transform: scale(1.1);
        }

        /* Само письмо/конверт */
        .letter {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #fffaf0; /* Кремовый цвет */
            border: 2px solid #a62626; /* Красный цвет из видео */
            box-sizing: border-box;
            border-radius: 10px; /* Немного закругленные углы */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 1s ease;
            transform-style: preserve-3d;
        }

        /* Внутренний текст (сначала скрыт) */
        .letter-content {
            opacity: 0;
            transition: opacity 0.5s 0.8s; /* Появляется после раскрытия */
        }

        .letter-content h2 {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
        }

        .letter-content p {
            font-size: 1em;
            color: #555;
            line-height: 1.6;
        }

        /* Четыре лепестка (клапана) конверта */
        .flap {
            position: absolute;
            background-color: #a62626;
            transition: transform 1s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            backface-visibility: hidden;
        }

        /* Верхний лепесток (в форме сердца при сложении) */
        .flap.top {
            width: 100%;
            height: 50%;
            top: 0;
            clip-path: polygon(50% 100%, 0% 0%, 100% 0%);
            transform-origin: top;
            transform: rotateX(0deg);
        }

        /* Нижний лепесток */
        .flap.bottom {
            width: 100%;
            height: 50%;
            bottom: 0;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            transform-origin: bottom;
            transform: rotateX(0deg);
        }

        /* Левый лепесток */
        .flap.left {
            width: 50%;
            height: 100%;
            left: 0;
            clip-path: polygon(0% 0%, 100% 50%, 0% 100%);
            transform-origin: left;
            transform: rotateY(0deg);
        }

        /* Правый лепесток */
        .flap.right {
            width: 50%;
            height: 100%;
            right: 0;
            clip-path: polygon(100% 0%, 0% 50%, 100% 100%);
            transform-origin: right;
            transform: rotateY(0deg);
        }

        /* Сердце на лицевой стороне (когда сложено) */
        .heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: #a62626;
            clip-path: polygon(50% 100%, 0% 30%, 20% 0%, 50% 25%, 80% 0%, 100% 30%);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: opacity 0.5s ease;
            z-index: 10; /* Поверх всего */
        }

        /* СОСТОЯНИЕ РАСКРЫТИЯ (при наведении) */
        .envelope-wrapper:hover .flap.top { transform: rotateX(180deg); }
        .envelope-wrapper:hover .flap.bottom { transform: rotateX(-180deg); }
        .envelope-wrapper:hover .flap.left { transform: rotateY(-180deg); }
        .envelope-wrapper:hover .flap.right { transform: rotateY(180deg); }

        .envelope-wrapper:hover .heart { opacity: 0; pointer-events: none; }
        .envelope-wrapper:hover .letter-content { opacity: 1; }

        /* Показать письмо целиком при раскрытии */
        .envelope-wrapper:hover .letter {
            transform: rotateX(10deg); /* Немного наклонить для глубины */
        }

    </style>
</head>
<body>

    <div class="envelope-wrapper">
        <div class="letter">
            <div class="flap top"></div>
            <div class="flap bottom"></div>
            <div class="flap left"></div>
            <div class="flap right"></div>
            <div class="heart"></div>

            <div class="letter-content">
                <h2>My dear friend,</h2>
                <p>I love you very much and I want to be there for you when you need me.</p>
                <p><strong>With love, Darina ♥</strong></p>
            </div>
        </div>
    </div>

</body>
</html>
