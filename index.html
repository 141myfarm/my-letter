<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моему дорогому другу</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #1a1b1c; /* Темный фон как на фото */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            perspective: 1500px; /* Добавляем глубину для 3D */
        }

        /* Контейнер сцены */
        #scene {
            position: relative;
            width: 260px;
            height: 260px;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        /* Центральная часть листа (там где текст) */
        .base-paper {
            position: absolute;
            top: 0; left: 0;
            width: 260px; height: 260px;
            background: #f4ebd8; /* Цвет старой бумаги */
            box-shadow: inset 0 0 50px rgba(110, 80, 40, 0.2), 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            border: 1px solid rgba(139, 100, 50, 0.3);
        }

        /* Красивые рамки внутри, чтобы имитировать узоры */
        .base-paper::before {
            content: '';
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1px solid rgba(139, 100, 50, 0.4);
        }
        .base-paper::after {
            content: '';
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 1px dashed rgba(139, 100, 50, 0.3);
        }

        /* Стили текста */
        .greeting {
            font-size: 24px;
            font-weight: 700;
            color: #3d2a1d;
            margin-bottom: 10px;
            z-index: 2;
        }
        .message {
            font-size: 20px;
            font-weight: 500;
            color: #4a3324;
            line-height: 1.4;
            margin-bottom: 20px;
            z-index: 2;
        }
        .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 32px;
            color: #8b2126; /* Цвет красных чернил/лепестков */
            z-index: 2;
        }
        .heart-icon {
            font-size: 18px;
            color: #c92a2a;
        }

        /* Настройка створок (Flaps) */
        .flap {
            position: absolute;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.3));
        }

        .face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            background: #f4ebd8; /* Цвет бумаги внутри */
        }

        .face.outer {
            background: #e8dbxc; /* Чуть темнее снаружи */
            /* Здесь имитируем рисунок на закрытом конверте */
            background-image: radial-gradient(circle, #f2e6d0 40%, #dfcbb0 100%);
        }

        /* Создаем форму треугольников для створок */
        .flap.top    { top: -130px; left: 0; width: 260px; height: 130px; transform-origin: bottom; }
        .flap.bottom { bottom: -130px; left: 0; width: 260px; height: 130px; transform-origin: top; }
        .flap.left   { top: 0; left: -130px; width: 130px; height: 260px; transform-origin: right; }
        .flap.right  { top: 0; right: -130px; width: 130px; height: 260px; transform-origin: left; }

        .flap.top .face    { clip-path: polygon(50% 0, 0 100%, 100% 100%); }
        .flap.bottom .face { clip-path: polygon(0 0, 100% 0, 50% 100%); }
        .flap.left .face   { clip-path: polygon(100% 0, 100% 100%, 0 50%); }
        .flap.right .face  { clip-path: polygon(0 0, 100% 50%, 0 100%); }

        /* Разворачиваем внешние стороны створок для правильного 3D */
        .flap.top .face.outer    { transform: rotateX(180deg); }
        .flap.bottom .face.outer { transform: rotateX(180deg); }
        .flap.left .face.outer   { transform: rotateY(180deg); }
        .flap.right .face.outer  { transform: rotateY(180deg); }

        /* Чтобы нарисовать сердце на внешней стороне (когда закрыто) */
        .heart-part {
            position: absolute;
            background: #8b2126; /* Темно-красный цвет сердца */
        }
        .flap.top .outer .heart-part { bottom: 0; left: 80px; width: 100px; height: 50px; border-radius: 50px 50px 0 0; }
        .flap.bottom .outer .heart-part { top: 0; left: 105px; width: 50px; height: 50px; clip-path: polygon(50% 100%, 0 0, 100% 0); }
        .flap.left .outer .heart-part { right: 0; top: 105px; width: 50px; height: 50px; clip-path: polygon(100% 0, 100% 100%, 0 50%); }
        .flap.right .outer .heart-part { left: 0; top: 105px; width: 50px; height: 50px; clip-path: polygon(0 0, 0 100%, 100% 50%); }

        /* === СОСТОЯНИЯ АНИМАЦИИ (3 ШАГА) === */

        /* ШАГ 1: Полностью закрыто (Квадрат) */
        .state-0 .flap.top    { transform: rotateX(-179deg); } /* -179 вместо 180, чтобы браузер не «мерцал» */
        .state-0 .flap.bottom { transform: rotateX(179deg); }
        .state-0 .flap.left   { transform: rotateY(179deg); }
        .state-0 .flap.right  { transform: rotateY(-179deg); }
        .state-0 { transform: scale(1) rotateZ(0deg); }

        /* ШАГ 2: Полуоткрытая звездочка (Сцена 2) */
        .state-1 .flap.top    { transform: rotateX(-120deg); }
        .state-1 .flap.bottom { transform: rotateX(120deg); }
        .state-1 .flap.left   { transform: rotateY(120deg); }
        .state-1 .flap.right  { transform: rotateY(-120deg); }
        .state-1 { transform: scale(0.85) rotateX(30deg); } /* Слегка отдаляем и наклоняем для 3D эффекта */

        /* ШАГ 3: Полностью открыто (Плоский лист) */
        .state-2 .flap        { transform: rotate(0deg); }
        .state-2 { transform: scale(1.1) rotateX(0deg); } /* Увеличиваем, чтобы было удобно читать */

        /* Инструкция внизу */
        .hint {
            position: absolute;
            bottom: 40px;
            color: rgba(255, 255, 255, 0.6);
            font-family: sans-serif;
            font-size: 14px;
            pointer-events: none;
            letter-spacing: 1px;
            transition: opacity 0.5s;
        }
        .state-2 ~ .hint { opacity: 0; } /* Прячем подсказку, когда письмо полностью открыто */

    </style>
</head>
<body>

    <div id="scene" class="state-0" onclick="nextState()">
        
        <div class="base-paper">
            <p class="greeting">My dear friend,</p>
            <p class="message">I love you very much and I want to be there for you when you need me.</p>
            <p class="signature">With love,<br>Darina <span class="heart-icon">♥</span></p>
        </div>

        <div class="flap top">
            <div class="face inner"></div>
            <div class="face outer"><div class="heart-part"></div></div>
        </div>
        
        <div class="flap bottom">
            <div class="face inner"></div>
            <div class="face outer"><div class="heart-part"></div></div>
        </div>
        
        <div class="flap left">
            <div class="face inner"></div>
            <div class="face outer"><div class="heart-part"></div></div>
        </div>
        
        <div class="flap right">
            <div class="face inner"></div>
            <div class="face outer"><div class="heart-part"></div></div>
        </div>

    </div>

    <div class="hint">✨ Нажми на письмо ✨</div>

    <script>
        // Простой скрипт, который переключает 3 состояния по кругу
        let currentState = 0;
        const scene = document.getElementById('scene');

        function nextState() {
            // Удаляем старый класс
            scene.classList.remove('state-' + currentState);
            
            // Увеличиваем состояние (0 -> 1 -> 2 -> 0)
            currentState = (currentState + 1) % 3;
            
            // Добавляем новый класс
            scene.classList.add('state-' + currentState);
        }
    </script>
</body>
</html>
