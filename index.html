<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4e4d7; font-family: 'Georgia', serif; }
        
        .envelope {
            width: 200px; height: 200px; position: relative; cursor: pointer;
            transition: transform 0.6s ease; transform-style: preserve-3d;
        }

        .front {
            width: 100%; height: 100%; background: #a62626;
            clip-path: polygon(50% 100%, 0% 30%, 20% 0%, 50% 25%, 80% 0%, 100% 30%);
            position: absolute; z-index: 2;
        }

        .letter {
            width: 400px; height: 400px; background: #fffaf0;
            position: absolute; top: -100px; left: -100px;
            border: 2px solid #333; padding: 40px; box-sizing: border-box;
            opacity: 0; transform: scale(0.5); transition: 0.6s;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        .envelope:hover .front { transform: rotateY(180deg); opacity: 0; }
        .envelope:hover .letter { opacity: 1; transform: scale(1); }
    </style>
</head>
<body>

    <div class="envelope">
        <div class="front"></div>
        <div class="letter">
            <h2>My dear friend,</h2>
            <p>I love you very much and I want to be there for you when you need me.</p>
            <p><strong>With love, Darina ♥</strong></p>
        </div>
    </div>

</body>
</html>
