<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vintage Letter</title>
  <style>
    :root {
      --size: min(340px, 86vw);
      --half: calc(var(--size) / 2);
      --paper: #e6dcc5; /* Цвет старого пергамента */
      --ink: #2a1b0f;    /* Цвет чернил */
      --bg: #1a1a1a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body { height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--bg); font-family: "Georgia", serif; overflow: hidden; }
    
    .scene { perspective: 1600px; width: var(--size); height: var(--size); position: relative; }
    .card { width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 1.7s cubic-bezier(0.25, 1, 0.5, 1); cursor: pointer; transform: rotateX(18deg) rotateZ(-6deg); }
    
    /* Основное поле письма */
    .base {
      position: absolute; inset: 0;
      background: radial-gradient(circle at center, #f4e8cf, #e6dcc5);
      box-shadow: 0 20px 45px rgba(0,0,0,0.8);
      border: 2px solid var(--ink);
      padding: 30px;
      text-align: center;
      display: flex; flex-direction: column; justify-content: center;
    }

    /* Створки в винтажном стиле */
    .flap { position: absolute; transform-style: preserve-3d; transition: transform 1.7s; z-index: 5; }
    .face { position: absolute; inset: 0; backface-visibility: hidden; border: 1px solid var(--ink); background: var(--paper); }
    
    /* Стилизация под гравюру (вставьте пути к картинкам здесь) */
    .pattern {
      width: 100%; height: 100%;
      background-size: cover;
      opacity: 0.7;
    }

    .top { top: 0; left: 0; width: var(--size); height: var(--half); transform-origin: top center; clip-path: polygon(0 0, 100% 0, 50% 100%); }
    .bot { bottom: 0; left: 0; width: var(--size); height: var(--half); transform-origin: bottom center; clip-path: polygon(50% 0, 100% 100%, 0 100%); }
    .left { top: 0; left: 0; width: var(--half); height: var(--size); transform-origin: center left; clip-path: polygon(0 0, 100% 50%, 0 100%); }
    .right { top: 0; right: 0; width: var(--half); height: var(--size); transform-origin: center right; clip-path: polygon(100% 0, 100% 100%, 0 50%); }

    /* Анимация */
    .s1 .top { transform: rotateX(108deg); }
    .s1 .bot { transform: rotateX(-108deg); }
    .s1 .left { transform: rotateY(-108deg); }
    .s1 .right { transform: rotateY(108deg); }
    
    .s2 { transform: scale(0.6); }
    .s2 .top { transform: rotateX(180deg); }
    .s2 .bot { transform: rotateX(-180deg); }
    .s2 .left { transform: rotateY(-180deg); }
    .s2 .right { transform: rotateY(180deg); }
  </style>
</head>
<body>

  <div class="scene" onclick="next()">
    <div class="card" id="card">
      <div class="base">
        <h1 style="color: var(--ink);">K</h1>
        <p style="color: var(--ink); font-style: italic;">With love</p>
      </div>
      <div class="flap top"><div class="face"><div class="pattern"></div></div></div>
      <div class="flap bot"><div class="face"><div class="pattern"></div></div></div>
      <div class="flap left"><div class="face"><div class="pattern"></div></div></div>
      <div class="flap right"><div class="face"><div class="pattern"></div></div></div>
    </div>
  </div>

  <script>
    let stage = 0;
    function next() {
      const card = document.getElementById("card");
      stage = (stage + 1) % 3;
      card.className = "card s" + stage;
    }
  </script>
</body>
</html>
